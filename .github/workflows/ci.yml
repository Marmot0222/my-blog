name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build without runtime secrets
        run: pnpm build

      - name: Validate production environment contract
        run: bash scripts/validate-production-env.sh .env.production.example --check-config-only

      - name: Validate production Compose
        run: docker compose --env-file .env.production.example -f compose.prod.yml config

      - name: Build production Web image
        run: docker build --target web-runner --build-arg APP_VERSION="$GITHUB_SHA" -t my-blog:test .
